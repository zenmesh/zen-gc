# golangci-lint v2 — zen-gc
#
# See docs/LINTING.md.

version: "2"

run:
  timeout: 10m
  tests: true
  go: "1.26"

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true

linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - err113
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - ineffassign
    - misspell
    - mnd
    - nakedret
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
    - govet

  settings:
    dupl:
      threshold: 120
    goconst:
      min-len: 3
      min-occurrences: 6
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 35
    godot:
      scope: declarations
      exclude:
        - '^TODO:'
        - '^FIXME:'
        - '^NOTE:'
      capital: true
    gosec:
      excludes:
        - G104
        - G204
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "8"
        - "10"
        - "15"
        - "20"
        - "35"
        - "52"
        - "100"
        - "200"
        - "404"
        - "500"
        - "1000"
        - "1024"
        - "2048"
        - "4096"
        - "65534"
        - "65535"
      ignored-functions:
        - time.Sleep
        - time.Duration
        - time.Second
        - time.Minute
        - time.Hour
        - time.Millisecond
        - time.Microsecond
        - time.Nanosecond
    revive:
      rules:
        - name: exported
          severity: warning
        - name: error-return
          severity: warning
        - name: error-naming
          severity: warning
        - name: var-naming
          severity: warning
        - name: package-comments
          disabled: true
    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1020"
        - "-ST1021"
        - "-QF1003"
        - "-QF1007"
        - "-QF1008"

  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*_generated\.go$
      - zz_generated\.deepcopy\.go$
      - vendor
      - third_party
      - testdata
      - examples
      - tmp
      - bin
      - deploy
      - charts
      - .github
    rules:
      - path: _test\.go
        linters:
          - godot
          - err113
          - dupl
          - goconst
      - path: _test\.go
        linters:
          - errcheck
      - path: _test\.go
        linters:
          - noctx
      - path: _test\.go
        linters:
          - staticcheck
        text: SA1019:.*NewSimpleClientset
      - linters:
          - staticcheck
        text: "SA9003:"
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv).* is not checked

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*_generated\.go$
      - zz_generated\.deepcopy\.go$
      - vendor
      - third_party
      - testdata
      - examples
      - tmp
      - bin
      - deploy
      - charts
      - .github
