# golangci-lint v2 — zen-gc (OSS-friendly scope)
#
# Full stylistic linters (goconst, godot, dupl, revive package-comments, err113) are
# intentionally off until backlog cleanup — see docs/LINTING.md.

version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.26"

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true

linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - gosec
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - staticcheck
    - unconvert
    - unused
    - whitespace
    - gocyclo
    - govet

  settings:
    gocyclo:
      min-complexity: 35
    gosec:
      excludes:
        - G104
        - G204
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1020"
        - "-ST1021"
        - "-QF1003"
        - "-QF1007"
        - "-QF1008"

  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*_generated\.go$
      - zz_generated\.deepcopy\.go$
      - vendor
      - third_party
      - testdata
      - examples
      - tmp
      - bin
      - deploy
      - charts
      - .github
    rules:
      # Tests often omit explicit error checks for brevity
      - path: _test\.go
        linters:
          - errcheck
      # Tests: httptest without context is acceptable
      - path: _test\.go
        linters:
          - noctx
      # Webhook handlers run cleanup goroutines with detached lifecycle
      - path: pkg/webhook/webhook\.go
        linters:
          - gosec
        text: G118
      # client-go fake deprecation in tests
      - path: _test\.go
        linters:
          - staticcheck
        text: SA1019:.*NewSimpleClientset
      - linters:
          - staticcheck
        text: "SA9003:"
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv).* is not checked

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*_generated\.go$
      - zz_generated\.deepcopy\.go$
      - vendor
      - third_party
      - testdata
      - examples
      - tmp
      - bin
      - deploy
      - charts
      - .github
